<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; background-color: #f4f7f6; overflow: hidden; }
        #welcome-screen, #result-screen { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 600px; z-index: 10; }
        #task-canvas { display: none; background-color: #ffffff; cursor: crosshair; position: absolute; top: 0; left: 0; }
        #result-screen { display: none; }
        input, button { padding: 12px 20px; margin: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; }
        button { cursor: pointer; background-color: #2ecc71; color: white; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #27ae60; transform: scale(1.05); }
        .stats-label { font-size: 1.2rem; margin-bottom: 20px; color: #34495e; }
        #chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>Reaction Task</h1>
        <p>Click the 10 red circles as fast as you can.</p>
        <input type="text" id="participant-id" placeholder="Enter Name/ID">
        <br>
        <button id="start-btn">Start Task</button>
    </div>

    <canvas id="task-canvas"></canvas>

    <div id="result-screen">
        <h2>Results</h2>
        <div class="stats-label" id="user-avg-text">Calculating...</div>
        <div id="chart-container">
            <canvas id="resultsChart"></canvas>
        </div>
        <br>
        <button onclick="location.reload()">Try Again</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz2SxNReCh3jPnRZpjdKiX41Ff1t7VpjREJZ7MhZ52Xj5Ebu28r5q7BG7CVpJ4yH6A_/exec";
        
        let pID = "";
        let sessionRTs = [];
        let trialCount = 0;
        const maxTrials = 10;
        let startT, cX, cY;
        const radius = 50;

        const welcome = document.getElementById('welcome-screen');
        const results = document.getElementById('result-screen');
        const canvas = document.getElementById('task-canvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('start-btn').onclick = () => {
            const input = document.getElementById('participant-id').value.trim();
            pID = input || "User_" + Math.random().toString(36).substr(2, 5).toUpperCase();
            welcome.style.display = 'none';
            canvas.style.display = 'block';
            resize();
            runTrial();
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function runTrial() {
            if (trialCount < maxTrials) {
                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    cX = Math.random() * (canvas.width - radius * 2) + radius;
                    cY = Math.random() * (canvas.height - radius * 2) + radius;
                    ctx.beginPath();
                    ctx.arc(cX, cY, radius, 0, Math.PI * 2);
                    ctx.fillStyle = "#e74c3c";
                    ctx.fill();
                    startT = performance.now();
                }, 600);
            } else {
                showResults();
            }
        }

        canvas.onclick = (e) => {
            const dist = Math.sqrt((e.clientX - cX)**2 + (e.clientY - cY)**2);
            if (dist < radius) {
                const rt = Math.round(performance.now() - startT);
                sessionRTs.push(rt);
                trialCount++;
                postData(pID, trialCount, rt);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                runTrial();
            }
        };

        function postData(id, trial, rt) {
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ Participant_ID: id, Trial_Number: trial, Reaction_Time: rt })
            });
        }

        async function showResults() {
            canvas.style.display = 'none';
            results.style.display = 'block';
            
            const userAvg = sessionRTs.reduce((a, b) => a + b, 0) / maxTrials;
            document.getElementById('user-avg-text').innerText = `Your Average: ${Math.round(userAvg)}ms`;

            try {
                const res = await fetch(WEB_APP_URL);
                const history = await res.json();
                buildHistogram(history, userAvg);
            } catch (err) {
                console.error("Historical data fetch failed.");
            }
        }

        function buildHistogram(data, userAvg) {
            const binSize = 50; 
            const combined = data.concat(userAvg);
            const maxVal = Math.max(...combined, 1000);
            
            const bins = {};
            for (let i = 0; i <= maxVal; i += binSize) bins[i] = 0;
            
            data.forEach(val => {
                const b = Math.floor(val / binSize) * binSize;
                if (bins[b] !== undefined) bins[b]++;
            });

            const labels = Object.keys(bins).map(k => k + "ms");
            const counts = Object.values(bins);

            new Chart(document.getElementById('resultsChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Global History',
                        data: counts,
                        backgroundColor: 'rgba(52, 152, 219, 0.5)',
                        borderColor: '#2980b9',
                        borderWidth: 1,
                        barPercentage: 1,
                        categoryPercentage: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                },
                plugins: [{
                    // Custom plugin to draw the "YOU" line
                    afterDraw: chart => {
                        const {ctx, scales: {x, y}} = chart;
                        const binIndex = Math.floor(userAvg / binSize);
                        const xPixel = x.getPixelForValue(labels[binIndex]);

                        ctx.save();
                        ctx.strokeStyle = '#e74c3c';
                        ctx.setLineDash([5, 5]);
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(xPixel, y.top);
                        ctx.lineTo(xPixel, y.bottom);
                        ctx.stroke();
                        
                        ctx.fillStyle = '#e74c3c';
                        ctx.font = 'bold 12px sans-serif';
                        ctx.fillText('YOU', xPixel - 12, y.top - 10);
                        ctx.restore();
                    }
                }]
            });
        }

        window.onresize = resize;
    </script>
</body>
</html>
