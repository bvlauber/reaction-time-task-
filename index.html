<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; display: flex; justify-content: center; align-items: center; background-color: #f0f2f5; overflow: hidden; }
        #welcome-screen, #result-screen { text-align: center; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 600px; }
        #task-canvas { display: none; background-color: white; cursor: crosshair; position: absolute; top: 0; left: 0; }
        #result-screen { display: none; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; margin-top: 20px; }
        input { padding: 10px; font-size: 16px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        .stats { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #333; }
        #chart-wrapper { height: 350px; width: 100%; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>Reaction Task</h1>
        <p>Enter your ID and click "Start". <br> Click the red circles as fast as you can (10 trials).</p>
        <input type="text" id="participant-id" placeholder="Participant ID">
        <br>
        <button id="start-btn">Start Task</button>
    </div>

    <canvas id="task-canvas"></canvas>

    <div id="result-screen">
        <h2>Task Complete!</h2>
        <div class="stats" id="user-avg-display">Calculating average...</div>
        <div id="chart-wrapper">
            <canvas id="resultsChart"></canvas>
        </div>
        <button onclick="location.reload()">Restart Experiment</button>
    </div>

    <script>
        // REPLACE THIS URL WITH YOUR DEPLOYED GOOGLE SCRIPT URL
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwlTusdUz7xM-edyX8x5AjOsYGNiVk2S_ADHCOSKBDpI_mz54DQCwoJoVFEk3p8R7GG/exec";
        
        let participantId = "";
        let sessionData = [];
        let trialNumber = 0;
        const totalTrials = 10;
        let startTime, circleX, circleY;
        const radius = 40;

        const welcome = document.getElementById('welcome-screen');
        const results = document.getElementById('result-screen');
        const canvas = document.getElementById('task-canvas');
        const ctx = canvas.getContext('2d');

        // Logic for Start Button
        document.getElementById('start-btn').onclick = () => {
            const inputVal = document.getElementById('participant-id').value.trim();
            // Rubric Logic: Assign random ID if blank
            participantId = inputVal || "User_" + Math.random().toString(36).substring(2, 7).toUpperCase();
            
            welcome.style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            nextTrial();
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function nextTrial() {
            if (trialNumber < totalTrials) {
                // Short wait before showing the circle
                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Random location (keeping circle fully on screen)
                    circleX = Math.random() * (canvas.width - radius * 2) + radius;
                    circleY = Math.random() * (canvas.height - radius * 2) + radius;
                    
                    ctx.beginPath();
                    ctx.arc(circleX, circleY, radius, 0, Math.PI * 2);
                    ctx.fillStyle = "#ff4d4d";
                    ctx.fill();
                    
                    startTime = performance.now();
                }, 500);
            } else {
                finishTask();
            }
        }

        canvas.onclick = (e) => {
            const dist = Math.sqrt((e.clientX - circleX)**2 + (e.clientY - circleY)**2);
            if (dist < radius) {
                const rt = Math.round(performance.now() - startTime);
                trialNumber++;
                sessionData.push(rt);
                
                // Rubric: Record 10 distinct rows per user
                sendDataToSheet(participantId, trialNumber, rt);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                nextTrial();
            }
        };

        function sendDataToSheet(id, trial, rt) {
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Bypasses CORS errors
                body: JSON.stringify({
                    Participant_ID: id,
                    Trial_Number: trial,
                    Reaction_Time: rt
                })
            });
        }

        async function finishTask() {
            canvas.style.display = 'none';
            results.style.display = 'block';
            
            const avg = sessionData.reduce((a, b) => a + b, 0) / totalTrials;
            document.getElementById('user-avg-display').innerText = `Your Average RT: ${Math.round(avg)}ms`;

            try {
                // Rubric: Pull historical data via GET
                const response = await fetch(WEB_APP_URL);
                const historicalData = await response.json();
                renderHistogram(historicalData, avg);
            } catch (err) {
                console.error("Could not fetch historical data.");
            }
        }

        function renderHistogram(allRTs, userAvg) {
            const binSize = 50;
            // Create bins (0-50, 51-100, etc.)
            const max = Math.max(...allRTs, userAvg, 1000);
            const bins = {};
            for (let i = 0; i <= max; i += binSize) bins[i] = 0;
            
            allRTs.forEach(val => {
                const b = Math.floor(val / binSize) * binSize;
                if (bins[b] !== undefined) bins[b]++;
            });

            const labels = Object.keys(bins).map(b => b + "ms");
            const counts = Object.values(bins);

            new Chart(document.getElementById('resultsChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'All Participants',
                        data: counts,
                        backgroundColor: 'rgba(0, 123, 255, 0.4)',
                        borderColor: '#007bff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                },
                plugins: [{
                    // Rubric: Visually indicate current participant's average
                    afterDraw: (chart) => {
                        const {ctx, scales: {x, y}} = chart;
                        const xPos = x.getPixelForValue(labels[Math.floor(userAvg / binSize)]);
                        
                        ctx.save();
                        ctx.strokeStyle = 'red';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.moveTo(xPos, y.top);
                        ctx.lineTo(xPos, y.bottom);
                        ctx.stroke();
                        
                        ctx.fillStyle = 'red';
                        ctx.font = 'bold 12px Arial';
                        ctx.fillText('YOU', xPos - 12, y.top - 5);
                        ctx.restore();
                    }
                }]
            });
        }

        window.onresize = resizeCanvas;
    </script>
</body>
</html>
